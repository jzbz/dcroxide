[package]
name = "dcroxide-txscript"
description = "Decred script engine mirroring dcrd's txscript: tokenizer, opcodes, engine, and signature hashing"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
dcroxide-base58 = { path = "../dcroxide-base58" }
dcroxide-chaincfg = { path = "../dcroxide-chaincfg" }
dcroxide-chainhash = { path = "../dcroxide-chainhash" }
dcroxide-crypto = { path = "../dcroxide-crypto" }
dcroxide-dcrec = { path = "../dcroxide-dcrec" }
dcroxide-wire = { path = "../dcroxide-wire" }
sha1 = { version = "0.10.6", default-features = false }
sha2 = { version = "0.10.8", default-features = false }

[dev-dependencies]
dcroxide-testutil = { path = "../dcroxide-testutil" }
serde_json = "1"

[lints]
workspace = true
