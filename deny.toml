[graph]
all-features = true

[advisories]
yanked = "deny"

[licenses]
allow = [
    "ISC",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    # The Mozilla CA certificate bundle shipped by webpki-roots (rustls).
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
